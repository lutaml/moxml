name: rake

on:
  push:
    branches: [ main ]
    tags: [ v* ]
  pull_request:

permissions:
  contents: read

jobs:
  rake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - name: Install dependencies
        run: bundle install
      - name: Run fast tests (unit + adapter + integration)
        run: bundle exec rake spec:fast
      - name: Run rubocop
        run: bundle exec rubocop
