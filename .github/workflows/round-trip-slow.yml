name: round-trip-slow

on:
  push:
    branches: [ main ]
  pull_request:

# EXPERIMENTAL: These tests cover REXML and Ox adapters with Nokogiri as the
# reference adapter. Ox lacks proper namespace support and standard XPath (uses
# custom locate() method). REXML is pure Ruby and exponentially slow with
# document size. See round-trip.yml for the main CI which tests only
# Nokogiri + Oga (fully XML-compliant).

jobs:
  nokogiri-rexml:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        ruby: [ "3.3", "4.0" ]
        category: [ metanorma, rfcxml, niso-jats ]
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Run Nokogiri × REXML round-trip tests (${{ matrix.category }})
        run: bundle exec rspec spec/consistency/ --tag round_trip --tag fixture_category:${{ matrix.category }}
        env:
          MOXML_ROUNDTRIP_TIMEOUT: 300
          MOXML_ROUNDTRIP_ADAPTERS: nokogiri,rexml
          MOXML_ROUNDTRIP_REXML_MAX_SIZE: 50000

  nokogiri-ox:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: [ "3.3", "4.0" ]
        category: [ metanorma, rfcxml, niso-jats ]
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Run Nokogiri × Ox round-trip tests (${{ matrix.category }})
        run: bundle exec rspec spec/consistency/ --tag round_trip --tag fixture_category:${{ matrix.category }}
        env:
          MOXML_ROUNDTRIP_TIMEOUT: 300
          MOXML_ROUNDTRIP_ADAPTERS: nokogiri,ox
